name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Windows ${{ matrix.config }}
    runs-on:
      group: Windows
      labels: windows
    strategy:
      fail-fast: false
      matrix:
        config:
          - Debug
          - Release

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up MSVC developer environment
        shell: cmd
        run: |
          @echo off
          setlocal
          for /f "usebackq delims=" %%I in (`vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set "VSINSTALLDIR=%%I"
          if not defined VSINSTALLDIR (
            echo Visual Studio with C++ build tools was not found on this Windows runner.
            exit /b 1
          )
          call "%VSINSTALLDIR%\Common7\Tools\VsDevCmd.bat" -arch=x86 -host_arch=x64
          if errorlevel 1 exit /b %errorlevel%
          set > "%RUNNER_TEMP%\msvc-env.txt"
          type "%RUNNER_TEMP%\msvc-env.txt" >> "%GITHUB_ENV%"

      - name: Verify local build tools
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not (Get-Command cmake -ErrorAction SilentlyContinue)) {
            throw "cmake is not available on this Windows runner. Install CMake and add it to PATH."
          }
          cmake --version
          cl

      - name: Configure
        run: cmake -S . -B build -A Win32

      - name: Build
        run: cmake --build build --config ${{ matrix.config }} --parallel

      - name: Upload DLL artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: dinput8-${{ matrix.config }}
          path: build/${{ matrix.config }}/dinput8.dll
          if-no-files-found: error
