name: CI

'on':
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint and Static Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install lint dependencies
        run: python -m pip install --disable-pip-version-check yamllint

      - name: Check GitHub Actions workflows
        shell: bash
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash) 1.7.12 /usr/local/bin
          actionlint

      - name: Check YAML files
        run: |
          git ls-files -z '*.yaml' '*.yml' ':(exclude)graphify-out/**' |
          xargs -0 --no-run-if-empty \
            yamllint -d '{extends: default, rules: {document-start: disable, line-length: disable}}'

      - name: Check JSON files
        run: |
          git ls-files -z '*.json' ':(exclude)graphify-out/**' |
          while IFS= read -r -d '' file; do
            python -m json.tool "$file" >/dev/null
          done

      - name: Check Python scripts
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          git ls-files -z '*.py' ':(exclude)graphify-out/**' |
          xargs -0 --no-run-if-empty python -m py_compile

      - name: Check whitespace
        run: |
          if git grep -nI -E '[[:blank:]]$' -- \
            '*.c' '*.cc' '*.cpp' '*.h' '*.hpp' \
            '*.cmake' 'CMakeLists.txt' \
            '*.json' '*.md' '*.py' \
            '*.yaml' '*.yml' \
            ':(exclude)graphify-out/**'; then
            echo "Trailing whitespace found"
            exit 1
          fi

      - name: Check final newlines
        run: |
          git ls-files -z \
            '*.c' '*.cc' '*.cpp' '*.h' '*.hpp' \
            '*.cmake' 'CMakeLists.txt' \
            '*.json' '*.md' '*.py' \
            '*.yaml' '*.yml' \
            ':(exclude)graphify-out/**' |
          while IFS= read -r -d '' file; do
            if [ -s "$file" ] && [ "$(tail -c 1 "$file" | wc -l)" -eq 0 ]; then
              echo "$file: missing trailing newline"
              exit 1
            fi
          done

  ai-adversarial-review:
    name: AI Adversarial Review
    needs: lint
    if: github.event_name == 'pull_request' && needs.lint.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Check review configuration
        env:
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: |
          if [ -n "${OPENAI_BASE_URL}" ] && [ -n "${OPENAI_API_KEY}" ] && [ -n "${OPENAI_MODEL}" ]; then
            exit 0
          fi
          echo "AI adversarial review requires OPENAI_BASE_URL, OPENAI_API_KEY, and OPENAI_MODEL." >&2
          exit 1

      - name: Checkout trusted base tree
        uses: actions/checkout@v6
        with:
          path: trusted
          ref: ${{ github.base_ref }}
          fetch-depth: 1

      - name: Mark trusted tree as safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE/trusted"

      - name: Fetch PR head
        run: git -C trusted fetch origin "${{ github.event.pull_request.head.sha }}" --depth=1

      - name: Build PR diff
        run: git -C trusted diff --unified=3 HEAD "${{ github.event.pull_request.head.sha }}" -- . ':(exclude)graphify-out/**' > pr.diff

      - name: Select review script
        id: review_script
        run: |
          if [ -f trusted/.github/scripts/ai_adversarial_review.py ]; then
            echo "path=trusted/.github/scripts/ai_adversarial_review.py" >> "$GITHUB_OUTPUT"
          else
            echo "path=.github/scripts/ai_adversarial_review.py" >> "$GITHUB_OUTPUT"
          fi

      - name: Run adversarial review
        env:
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL == 'openrouter' && 'https://openrouter.ai/api/v1' || vars.OPENAI_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          HTTP_REFERER: ${{ github.server_url }}/${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_REF: ${{ github.base_ref }}
        run: python3 "${{ steps.review_script.outputs.path }}" pr.diff
